name: Python package

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install uv
      uses: astral-sh/setup-uv@v5
    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - name: Install dependencies
      run: uv sync --extra dev --frozen
    - name: Download and prepare integration dataset
      run: uv run python tests/scripts/prepare_integration_data.py
    - name: Upload integration dataset
      uses: actions/upload-artifact@v4
      with:
        name: tech-stock-data
        path: tests/data/tech_stocks.parquet
        retention-days: 1

  build:
    runs-on: ubuntu-latest
    needs: fetch-data
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v4
    - name: Install uv
      uses: astral-sh/setup-uv@v5
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: uv sync --extra dev --frozen --python ${{ matrix.python-version }}
    - name: Assert matrix Python interpreter
      run: |
        uv run python - <<'PY'
        import os
        import sys

        expected = os.environ["EXPECTED_PYTHON_MINOR"]
        actual = f"{sys.version_info.major}.{sys.version_info.minor}"
        if actual != expected:
            raise SystemExit(f"Expected Python {expected}, got {actual}")
        print(f"Using Python {actual}")
        PY
      env:
        EXPECTED_PYTHON_MINOR: ${{ matrix.python-version }}
    - name: Download integration dataset
      uses: actions/download-artifact@v4
      with:
        name: tech-stock-data
        path: tests/data
    - name: Lint and format with ruff
      run: |
        uv run ruff format --check .
        uv run ruff check .
    - name: Type check with mypy
      run: uv run mypy kissbt tests
    - name: Test with pytest
      env:
        TECH_STOCK_DATA_PATH: tests/data/tech_stocks.parquet
      run: uv run pytest
